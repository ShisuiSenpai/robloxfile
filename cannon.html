<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Cannon Model</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">
        Realistic Cannon Model<br>
        Drag to rotate • Scroll to zoom<br>
        Press SPACE to fire animation
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 500);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Materials
        const ironMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a2a,
            metalness: 0.8,
            roughness: 0.4
        });

        const brassMaterial = new THREE.MeshStandardMaterial({
            color: 0xb87333,
            metalness: 0.9,
            roughness: 0.3
        });

        const woodMaterial = new THREE.MeshStandardMaterial({
            color: 0x654321,
            roughness: 0.8,
            metalness: 0.1
        });

        const wheelMaterial = new THREE.MeshStandardMaterial({
            color: 0x3d2817,
            roughness: 0.9,
            metalness: 0.1
        });

        // Cannon Group
        const cannonGroup = new THREE.Group();
        scene.add(cannonGroup);

        // Create cannon barrel with realistic tapering
        function createBarrel() {
            const barrelGroup = new THREE.Group();
            
            // Main barrel segments
            const segments = 8;
            const barrelLength = 8;
            
            for (let i = 0; i < segments; i++) {
                const t = i / (segments - 1);
                const radius = 0.5 - t * 0.15; // Taper from breech to muzzle
                const segmentLength = barrelLength / segments;
                
                const geometry = new THREE.CylinderGeometry(
                    radius - 0.02,
                    radius,
                    segmentLength,
                    32
                );
                
                const segment = new THREE.Mesh(geometry, ironMaterial);
                segment.position.z = -i * segmentLength - segmentLength/2;
                segment.rotation.x = Math.PI / 2;
                segment.castShadow = true;
                segment.receiveShadow = true;
                barrelGroup.add(segment);
            }
            
            // Reinforcement bands
            for (let i = 0; i < 3; i++) {
                const bandGeometry = new THREE.TorusGeometry(0.5 - i * 0.05, 0.05, 8, 32);
                const band = new THREE.Mesh(bandGeometry, brassMaterial);
                band.position.z = -i * 2.5 - 1;
                band.rotation.y = Math.PI / 2;
                band.castShadow = true;
                barrelGroup.add(band);
            }
            
            // Muzzle detail
            const muzzleGeometry = new THREE.CylinderGeometry(0.38, 0.35, 0.3, 32);
            const muzzle = new THREE.Mesh(muzzleGeometry, brassMaterial);
            muzzle.position.z = -barrelLength;
            muzzle.rotation.x = Math.PI / 2;
            muzzle.castShadow = true;
            barrelGroup.add(muzzle);
            
            // Breech block
            const breechGeometry = new THREE.BoxGeometry(1.2, 1.2, 0.5);
            const breech = new THREE.Mesh(breechGeometry, ironMaterial);
            breech.position.z = 0.25;
            breech.castShadow = true;
            barrelGroup.add(breech);
            
            // Touch hole
            const touchHoleGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 16);
            const touchHole = new THREE.Mesh(touchHoleGeometry, ironMaterial);
            touchHole.position.set(0, 0.5, -1);
            touchHole.castShadow = true;
            barrelGroup.add(touchHole);
            
            return barrelGroup;
        }

        // Create carriage
        function createCarriage() {
            const carriageGroup = new THREE.Group();
            
            // Main carriage beams
            const beamGeometry = new THREE.BoxGeometry(0.8, 0.6, 6);
            
            const leftBeam = new THREE.Mesh(beamGeometry, woodMaterial);
            leftBeam.position.set(-0.7, -0.5, -2);
            leftBeam.castShadow = true;
            leftBeam.receiveShadow = true;
            carriageGroup.add(leftBeam);
            
            const rightBeam = new THREE.Mesh(beamGeometry, woodMaterial);
            rightBeam.position.set(0.7, -0.5, -2);
            rightBeam.castShadow = true;
            rightBeam.receiveShadow = true;
            carriageGroup.add(rightBeam);
            
            // Cross beams
            for (let i = 0; i < 4; i++) {
                const crossBeamGeometry = new THREE.BoxGeometry(2.2, 0.3, 0.4);
                const crossBeam = new THREE.Mesh(crossBeamGeometry, woodMaterial);
                crossBeam.position.set(0, -0.5, i * 1.5 - 3);
                crossBeam.castShadow = true;
                carriageGroup.add(crossBeam);
            }
            
            // Trunnion supports
            const trunnionGeometry = new THREE.CylinderGeometry(0.15, 0.15, 2.5, 16);
            const leftTrunnion = new THREE.Mesh(trunnionGeometry, ironMaterial);
            leftTrunnion.position.set(-1.2, 0, -1);
            leftTrunnion.rotation.z = Math.PI / 2;
            leftTrunnion.castShadow = true;
            carriageGroup.add(leftTrunnion);
            
            const rightTrunnion = new THREE.Mesh(trunnionGeometry, ironMaterial);
            rightTrunnion.position.set(1.2, 0, -1);
            rightTrunnion.rotation.z = Math.PI / 2;
            rightTrunnion.castShadow = true;
            carriageGroup.add(rightTrunnion);
            
            // Metal brackets
            const bracketGeometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
            for (let side of [-1, 1]) {
                for (let i = 0; i < 3; i++) {
                    const bracket = new THREE.Mesh(bracketGeometry, ironMaterial);
                    bracket.position.set(side * 0.9, -0.1, i * 2 - 3);
                    bracket.castShadow = true;
                    carriageGroup.add(bracket);
                }
            }
            
            return carriageGroup;
        }

        // Create wheels
        function createWheel(radius = 1.5) {
            const wheelGroup = new THREE.Group();
            
            // Wheel rim
            const rimGeometry = new THREE.TorusGeometry(radius, 0.15, 8, 32);
            const rim = new THREE.Mesh(rimGeometry, ironMaterial);
            rim.castShadow = true;
            wheelGroup.add(rim);
            
            // Wheel body
            const wheelGeometry = new THREE.CylinderGeometry(radius - 0.1, radius - 0.1, 0.3, 32);
            const wheelBody = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheelBody.rotation.z = Math.PI / 2;
            wheelBody.castShadow = true;
            wheelBody.receiveShadow = true;
            wheelGroup.add(wheelBody);
            
            // Spokes
            const spokeGeometry = new THREE.BoxGeometry(0.1, radius * 2 - 0.3, 0.2);
            for (let i = 0; i < 8; i++) {
                const spoke = new THREE.Mesh(spokeGeometry, wheelMaterial);
                spoke.rotation.z = (i / 8) * Math.PI * 2;
                spoke.castShadow = true;
                wheelGroup.add(spoke);
            }
            
            // Hub
            const hubGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.5, 16);
            const hub = new THREE.Mesh(hubGeometry, ironMaterial);
            hub.rotation.z = Math.PI / 2;
            hub.castShadow = true;
            wheelGroup.add(hub);
            
            // Metal studs
            const studGeometry = new THREE.SphereGeometry(0.05, 8, 8);
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2;
                const stud = new THREE.Mesh(studGeometry, brassMaterial);
                stud.position.set(
                    0,
                    Math.cos(angle) * (radius - 0.2),
                    Math.sin(angle) * (radius - 0.2)
                );
                wheelGroup.add(stud);
            }
            
            return wheelGroup;
        }

        // Create axle
        function createAxle() {
            const axleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 3, 16);
            const axle = new THREE.Mesh(axleGeometry, ironMaterial);
            axle.rotation.z = Math.PI / 2;
            axle.castShadow = true;
            return axle;
        }

        // Assemble cannon
        const barrel = createBarrel();
        barrel.position.y = 1;
        cannonGroup.add(barrel);

        const carriage = createCarriage();
        cannonGroup.add(carriage);

        const leftWheel = createWheel();
        leftWheel.position.set(-1.5, -0.5, 1);
        leftWheel.rotation.y = Math.PI / 2;
        cannonGroup.add(leftWheel);

        const rightWheel = createWheel();
        rightWheel.position.set(1.5, -0.5, 1);
        rightWheel.rotation.y = Math.PI / 2;
        cannonGroup.add(rightWheel);

        const frontAxle = createAxle();
        frontAxle.position.set(0, -0.5, 1);
        cannonGroup.add(frontAxle);

        // Add small details
        // Elevation mechanism
        const elevationWheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 32);
        const elevationWheel = new THREE.Mesh(elevationWheelGeometry, brassMaterial);
        elevationWheel.position.set(-0.8, 0.5, 1.5);
        elevationWheel.rotation.z = Math.PI / 2;
        elevationWheel.castShadow = true;
        cannonGroup.add(elevationWheel);

        // Elevation screw
        const screwGeometry = new THREE.CylinderGeometry(0.05, 0.05, 2, 16);
        const screw = new THREE.Mesh(screwGeometry, brassMaterial);
        screw.position.set(-0.8, -0.5, 1.5);
        screw.castShadow = true;
        cannonGroup.add(screw);

        // Ground plane
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x567d46,
            roughness: 0.8
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Position cannon
        cannonGroup.position.y = 0.5;
        cannonGroup.rotation.y = Math.PI / 6;

        // Animation variables
        let isAnimating = false;
        let recoilAnimation = 0;

        // Handle keyboard input
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && !isAnimating) {
                isAnimating = true;
                recoilAnimation = 0;
                
                // Create muzzle flash
                const flashGeometry = new THREE.SphereGeometry(1, 16, 16);
                const flashMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xffaa00,
                    transparent: true,
                    opacity: 0.8
                });
                const flash = new THREE.Mesh(flashGeometry, flashMaterial);
                flash.position.copy(barrel.position);
                flash.position.z -= 8;
                cannonGroup.add(flash);
                
                setTimeout(() => {
                    cannonGroup.remove(flash);
                }, 100);
            }
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // Recoil animation
            if (isAnimating) {
                recoilAnimation += 0.1;
                const recoilAmount = Math.sin(recoilAnimation) * 0.3 * Math.exp(-recoilAnimation * 0.3);
                barrel.position.z = recoilAmount;
                
                if (recoilAnimation > 10) {
                    isAnimating = false;
                    barrel.position.z = 0;
                }
            }
            
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
