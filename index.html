<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Light Green Light - Squid Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>RED LIGHT GREEN LIGHT</h1>
            <div class="game-stats">
                <div class="health-bar-container">
                    <div class="health-bar" id="healthBar"></div>
                    <span class="health-text">HEALTH: <span id="healthValue">100</span></span>
                </div>
                <div class="timer">TIME: <span id="timer">60</span>s</div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="light-indicator" id="lightIndicator">
                <span class="light-text">GREEN LIGHT</span>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="game-controls">
            <button id="startBtn" class="btn">START GAME</button>
            <button id="restartBtn" class="btn" style="display: none;">RESTART</button>
        </div>
        
        <div class="instructions">
            <p>Use ARROW KEYS or WASD to move. Stop moving during RED LIGHT!</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
